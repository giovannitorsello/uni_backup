# Template per ogni cliente Bareos
# File: docker/bareos/bareos-dir.d/cliente-NOMEAZIENDA.conf
# Duplica e adatta per ogni cliente

Client {
  Name     = acme-fd
  Address  = 192.168.1.100
  FDPort   = 9102
  Password = "PASSWORD_FD_DA_CAMBIARE"
  Catalog  = MyCatalog
  File Retention  = 60 days
  Job Retention   = 180 days
  AutoPrune       = yes
}

Pool {
  Name            = AcmePool
  Pool Type       = Backup
  Recycle         = yes
  AutoPrune       = yes
  Volume Retention = 30 days
  Maximum Volumes = 3
  Label Format    = "VOL-ACME-"
}

FileSet {
  Name = "AcmeFileSet"
  Include {
    Options { Signature = MD5; Compression = LZ4 }
    File = /data
    File = /home
    File = /etc
  }
  Exclude {
    File = /tmp
    File = /proc
    File = /sys
    File = /dev
  }
}

Schedule {
  Name = "AcmeSchedule"
  Run  = Full         1st sun at 02:00
  Run  = Differential 2nd-5th sun at 02:00
  Run  = Incremental  mon-sat at 02:00
}

Job {
  Name      = "BackupAcme"
  Type      = Backup
  Client    = acme-fd
  FileSet   = "AcmeFileSet"
  Schedule  = "AcmeSchedule"
  Storage   = LTO-Dr-01
  Pool      = AcmePool
  Messages  = Standard
  Priority  = 10
  Write Bootstrap = "/var/lib/bareos/acme.bsr"
}

Job {
  Name    = "RestoreAcme"
  Type    = Restore
  Client  = acme-fd
  FileSet = "AcmeFileSet"
  Storage = LTO-Dr-01
  Pool    = AcmePool
  Messages = Standard
  Where   = /tmp/bareos-restores
}
