# ================================================================
# Autochanger mhvtl — 2 librerie virtuali
# Libreria 1: changer /dev/sg3, drive /dev/nst0 /dev/nst1
# Libreria 2: changer /dev/sg6, drive /dev/nst2 /dev/nst3
# Adatta i device in base all'output di: lsscsi -g
# ================================================================

# ── Libreria 1 ────────────────────────────────────────────────
Autochanger {
  Name            = mhvtl-Library-1
  Device          = mhvtl-L1-Drive0, mhvtl-L1-Drive1
  Changer Command = "/usr/lib/bareos/scripts/mtx-changer %c %o %S %a %d"
  Changer Device  = ${CHANGER_DEVICE}
}

Device {
  Name              = mhvtl-L1-Drive0
  Media Type        = LTO8-L1
  Archive Device    = ${TAPE_DEVICE}
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
}

Device {
  Name              = mhvtl-L1-Drive1
  Media Type        = LTO8-L1
  Archive Device    = ${TAPE_DEVICE_2}
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
}

# ── Libreria 2 ────────────────────────────────────────────────
Autochanger {
  Name            = mhvtl-Library-2
  Device          = mhvtl-L2-Drive0, mhvtl-L2-Drive1
  Changer Command = "/usr/lib/bareos/scripts/mtx-changer %c %o %S %a %d"
  Changer Device  = ${CHANGER_DEVICE_2}
}

Device {
  Name              = mhvtl-L2-Drive0
  Media Type        = LTO8-L2
  Archive Device    = ${TAPE_DEVICE_3}
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
}

Device {
  Name              = mhvtl-L2-Drive1
  Media Type        = LTO8-L2
  Archive Device    = ${TAPE_DEVICE_4}
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
}