# ----------------------------------------------------------------
# Autochanger mhvtl — test libreria virtuale kernel-level
# Richiede modulo mhvtl caricato sull'host e container privileged.
# Device esposti via docker-compose.override.yml:
#   TAPE_DEVICE=/dev/sg0
#   drive:  /dev/nst0, /dev/nst1
# ----------------------------------------------------------------

Autochanger {
  Name            = mhvtl-Library
  Device          = mhvtl-Drive0, mhvtl-Drive1
  Changer Command = "/usr/lib/bareos/scripts/mtx-changer %c %o %S %a %d"
  Changer Device  = /dev/sg0
}

Device {
  Name              = mhvtl-Drive0
  Media Type        = LTO
  Archive Device    = /dev/nst0
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  # Riavvolgi e scarica il nastro alla chiusura
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
  # Alert se il nastro è quasi pieno (80%)
  Alert Command     = "sh -c 'echo Cartridge Alert: %d' "
}

Device {
  Name              = mhvtl-Drive1
  Media Type        = LTO
  Archive Device    = /dev/nst1
  Device Type       = Tape
  AutomaticMount    = yes
  AlwaysOpen        = yes
  RemovableMedia    = yes
  RandomAccess      = no
  AutoChanger       = yes
  Offline On Unmount = yes
  Hardware End Of Medium = yes
  Fast Forward Space File = yes
  BSF at EOM        = yes
  Two EOF           = yes
  Alert Command     = "sh -c 'echo Cartridge Alert: %d' "
}
