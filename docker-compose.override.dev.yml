# docker-compose.override.yml  (sviluppo — git-ignored)
services:  
  services:
  mhvtl:
    build:
      context: ./docker/mhvtl
      dockerfile: Dockerfile
    container_name: tapeguard-mhvtl
    privileged: true
    volumes:
      - /lib/modules:/lib/modules:ro   # kernel modules dall'host
      - /usr/src:/usr/src:ro           # kernel headers dall'host
      - mhvtl_data:/opt/mhvtl
    networks:
      - ueb-net

  bareos-storage:
    depends_on:
      - mhvtl
    devices:
      - "${CHANGER_DEVICE_1}:${CHANGER_DEVICE_1}"      
      - "${TAPE_AUTOCH1_DEVICE_1}:${TAPE_AUTOCH1_DEVICE_1}"
      - "${TAPE_AUTOCH1_DEVICE_1}:${TAPE_AUTOCH1_DEVICE_2}"
      - "${TAPE_AUTOCH1_DEVICE_1}:${TAPE_AUTOCH1_DEVICE_3}"
      - "${TAPE_AUTOCH1_DEVICE_1}:${TAPE_AUTOCH1_DEVICE_4}"
      - "${CHANGER_DEVICE_2}:${CHANGER_DEVICE_2}"
      - "${TAPE_AUTOCH2_DEVICE_1}:${TAPE_AUTOCH2_DEVICE_1}"
      - "${TAPE_AUTOCH2_DEVICE_1}:${TAPE_AUTOCH2_DEVICE_2}"
      - "${TAPE_AUTOCH2_DEVICE_1}:${TAPE_AUTOCH2_DEVICE_3}"
      - "${TAPE_AUTOCH2_DEVICE_1}:${TAPE_AUTOCH2_DEVICE_4}"
    cap_add:
      - SYS_RAWIO

volumes:
  mhvtl_data: