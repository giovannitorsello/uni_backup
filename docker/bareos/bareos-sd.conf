Storage {
  Name       = bareos-sd-01
  SDPort     = 9103
  WorkingDirectory     = "/var/lib/bareos"
  PidDirectory         = "/run/bareos"
  Plugin Directory     = "/usr/lib/bareos/plugins"
  Maximum Concurrent Jobs = 20
}

Director {
  Name     = bareos-dir
  Password = "@BAREOS_DIRECTOR_PASSWORD@"
}

Messages {
  Name    = Standard
  Director = bareos-dir = all
}

# Drive singolo LTO — aggiungi un blocco Device per ogni lettore fisico
Device {
  Name            = LTO-Dr-01
  Media Type      = LTO-7
  Archive Device  = /dev/nst0
  AutomaticMount  = yes
  AlwaysOpen      = no
  RemovableMedia  = yes
  RandomAccess    = no
  Label Media     = yes
  Fast Forward Space File = no
  BSF at EOM      = yes
  Backward Space Record = no
  Two EOF         = yes
}

