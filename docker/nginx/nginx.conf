worker_processes auto;
events { worker_connections 1024; }

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on; keepalive_timeout 65;
  gzip on; gzip_types text/plain text/css application/javascript application/json;
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  upstream api { server api:3000; }
  upstream ui  { server ui:80;   }

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    ssl_certificate     /etc/nginx/certs/tapeguard.crt;
    ssl_certificate_key /etc/nginx/certs/tapeguard.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://api/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health { proxy_pass http://api/health; }
    location / {
      proxy_pass http://ui/;
      proxy_set_header Host $host;
    }
  }
}
