# Uni Easy Backup v2 — Gestione backup multi-backend
# Bareos compilato da sorgente locale (Debian 13 / trixie)

services:

  traefik:
    image: traefik:v3.2
    container_name: ueb-traefik
    restart: unless-stopped
    environment:
      - TRAEFIK_DASHBOARD_USERS=${TRAEFIK_DASHBOARD_USERS}
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ueb-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.file.filename=/etc/traefik/dynamic-conf.yml"
      
      # Let's Encrypt — sostituisci con il tuo resolver se hai un CA interno
      #- "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      #- "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@ueb.local}"
      #- "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Dashboard Traefik — raggiungibile su https://${TRAEFIK_DOMAIN}/dashboard/
      # MIDDLEWARE AUTH
      #- "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$8v9v796g$$76I/X0Xv7Xf8f6f6f6f6f0"
      - "--api.insecure=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/certs:/etc/traefik/certs
      - ./traefik-dynamic-conf.yml:/etc/traefik/dynamic-conf.yml
      #- traefik_certs:/letsencrypt
    networks:
      - ueb-net
    labels:
      - "traefik.enable=true"
      # Dashboard Traefik protetto da BasicAuth
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DOMAIN:-traefik.ueb.local}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      # htpasswd: genera con: echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
      #- "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"

  postgres:
    container_name: ueb-postgres
    user: "${DEV_UID}:${DEV_GID}"
    build:
      context: ./src/postgres
      dockerfile: Dockerfile.postgres      
      args:
        DEV_UID: "${DEV_UID}"
        DEV_GID: "${DEV_GID}"    
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-postgres}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ueb..2026!}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
      BAREOS_DB_USER: ${BAREOS_DB_USER}
      BAREOS_DB_PASSWORD: ${BAREOS_DB_PASSWORD}
      BAREOS_DB_NAME: ${BAREOS_DB_NAME}
      BAREOS_DB_HOST: ${BAREOS_DB_HOST}
      BAREOS_DB_PORT: ${BAREOS_DB_PORT}
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - ./docker/postgres/postgres_data:/var/lib/postgresql/data
      - ./src/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    networks:
      - ueb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ueb}"]
      interval: 10s
      timeout: 5s
      retries: 5


  ueb-bareos-base:
    build:
      context: ./src/bareos
      dockerfile: Dockerfile.bareos.base
    image: ueb-bareos-base:latest    
    pull_policy: never 

  # --- STEP 2: L'immagine Builder ---
  ueb-bareos-builder:
    build:
      context: ./src/bareos
      dockerfile: Dockerfile.bareos.builder
    image: ueb-bareos-builder:latest
    depends_on:
      - ueb-bareos-base
    pull_policy: never
  ueb-bareos-director:    
    build:
      context: ./src/bareos
      dockerfile: Dockerfile.bareos.director      
      args:
        BUILD_JOBS: ${BUILD_JOBS:-4}
    container_name: ueb-bareos-dir
    restart: unless-stopped
    depends_on:
      ueb-bareos-builder:
         condition: service_completed_successfully
      postgres:
         condition: service_healthy      
    environment:
      BAREOS_DB_NAME:           ${BAREOS_DB_NAME}
      BAREOS_DB_HOST:           ${BAREOS_DB_HOST}
      BAREOS_DB_PORT:           ${BAREOS_DB_PORT}      
      BAREOS_DB_USER:           ${BAREOS_DB_USER}
      BAREOS_DB_PASSWORD:       ${BAREOS_DB_PASSWORD}
      BAREOS_DIRECTOR_PASSWORD: ${BAREOS_DIRECTOR_PASSWORD}
      BAREOS_SD_PASSWORD:       ${BAREOS_SD_PASSWORD}
      BAREOS_SMTP_USER:         ${BAREOS_SMTP_USER}
      BAREOS_SMTP_PASSWORD:     ${BAREOS_SMTP_PASSWORD}
      BAREOS_SMTP_HOST:    ${BAREOS_SMTP_HOST}
      BAREOS_SMTP_PORT:    ${BAREOS_SMTP_PORT}
    volumes:
      - ./docker/bareos/bareos-dir.d:/etc/bareos/bareos-dir.d    
      - ./docker/bareos/bareos_data:/var/lib/bareos
      - ./docker/bareos/bareos_run:/var/run/bareos
    networks:
      - ueb-net
    ports:
      - "127.0.0.1:9101:9101"
    

  ueb-bareos-storage:    
    group_add:
      - "26" # dialout group per accesso a /dev/sg* (changer) e /dev/st* (tape drive) 
    build:
      context: ./src/bareos
      dockerfile: Dockerfile.bareos.storage      
    container_name: ueb-bareos-storage
    restart: unless-stopped
    environment:
      BAREOS_DIRECTOR_PASSWORD: ${BAREOS_DIRECTOR_PASSWORD}
      BAREOS_SD_PASSWORD:       ${BAREOS_SD_PASSWORD}
      SD_NAME:                  ${SD_NAME:-bareos-sd}
      CHANGER_DEVICE_1: ${CHANGER_DEVICE_1}
      TAPE_AUTOCH1_DEVICE_1: ${TAPE_AUTOCH1_DEVICE_1}
      TAPE_AUTOCH1_DEVICE_2: ${TAPE_AUTOCH1_DEVICE_2}
      TAPE_AUTOCH1_DEVICE_3: ${TAPE_AUTOCH1_DEVICE_3}
      TAPE_AUTOCH1_DEVICE_4: ${TAPE_AUTOCH1_DEVICE_4}
      CHANGER_DEVICE_2: ${CHANGER_DEVICE_2}
      TAPE_AUTOCH2_DEVICE_1: ${TAPE_AUTOCH2_DEVICE_1}
      TAPE_AUTOCH2_DEVICE_2: ${TAPE_AUTOCH2_DEVICE_2}
      TAPE_AUTOCH2_DEVICE_3: ${TAPE_AUTOCH2_DEVICE_3}
      TAPE_AUTOCH2_DEVICE_4: ${TAPE_AUTOCH2_DEVICE_4}
    devices:
      - "${CHANGER_DEVICE_1:-}:${CHANGER_DEVICE_1:-}"
      - "${TAPE_AUTOCH1_DEVICE_1:-}:${TAPE_AUTOCH1_DEVICE_1:-}"
      - "${TAPE_AUTOCH1_DEVICE_2:-}:${TAPE_AUTOCH1_DEVICE_2:-}"
      - "${TAPE_AUTOCH1_DEVICE_3:-}:${TAPE_AUTOCH1_DEVICE_3:-}"
      - "${TAPE_AUTOCH1_DEVICE_4:-}:${TAPE_AUTOCH1_DEVICE_4:-}"
      - "${CHANGER_DEVICE_2:-}:${CHANGER_DEVICE_2:-}"
      - "${TAPE_AUTOCH2_DEVICE_1:-}:${TAPE_AUTOCH2_DEVICE_1:-}"
      - "${TAPE_AUTOCH2_DEVICE_2:-}:${TAPE_AUTOCH2_DEVICE_2:-}"
      - "${TAPE_AUTOCH2_DEVICE_3:-}:${TAPE_AUTOCH2_DEVICE_3:-}"
      - "${TAPE_AUTOCH2_DEVICE_4:-}:${TAPE_AUTOCH2_DEVICE_4:-}"
    cap_add:
      - SYS_RAWIO
    volumes:
      - ./docker/bareos/bareos_storage:/var/lib/bareos/storage
      - ./docker/bareos/bareos_plugin:/usr/lib/bareos/plugins
      - ./docker/bareos/bareos_run:/var/run/bareos
    networks:
      - ueb-net
    ports:
      - "127.0.0.1:9103:9103"

  ueb-bareos-fd:    
    build:
      context: ./src/bareos
      dockerfile: Dockerfile.bareos.client      
      args:
        BUILD_JOBS: ${BUILD_JOBS:-4}
    container_name: ueb-bareos-fd
    restart: unless-stopped        
    environment:
      BAREOS_DIRECTOR_PASSWORD: ${BAREOS_DIRECTOR_PASSWORD}
      FD_NAME:           ${FD_NAME:-bareos-fd}
    volumes:
      - ./docker/bareos/bareos_plugin:/usr/lib/bareos/plugins
      - ./docker/bareos/bareos_run:/var/run/bareos
    networks:
      - ueb-net
    ports:
      - "127.0.0.1:9102:9102"

  seaweedfs:
    container_name: ueb-seaweedfs
    profiles:
      - manual
    build:
      context: ./src/postgres
      dockerfile: Dockerfile.seaweedfs      
      args:
        DEV_UID: "${DEV_UID}"
        DEV_GID: "${DEV_GID}"    
    
    ports:
      - "9333:9333" # Master HTTP (Dashboard)
      - "8080:8080" # Filer HTTP
      - "8333:8333" # S3 API Gateway
      - "18333:18333" # S3 gRPC
    volumes:
      - ./swfs_data:/data
    command: >
      weed server 
      -s3 
      -s3.port=8333
      -filer=true
      -master.dir=/data/mdir
      -dir=/data/vol
      -ip=seaweedfs
    networks:
      - ueb-net
    restart: unless-stopped
  api:
    profiles:
      - manual
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: ueb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.ueb.local}`)"
      - "traefik.http.routers.api.entrypoints=websecure"      
      - "traefik.http.services.api.loadbalancer.server.port=3000"        
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ueb
      DB_USER:     ${POSTGRES_USER:-ueb}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      BAREOS_DB_HOST:     postgres
      BAREOS_DB_NAME:     bareos
      BAREOS_DB_USER:     ${POSTGRES_USER:-ueb}
      BAREOS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      BCONSOLE_PASSWORD:  ${BAREOS_DIRECTOR_PASSWORD}
      RESTIC_S3_ENDPOINT:   ${RESTIC_S3_ENDPOINT:-http://minio:9000}
      RESTIC_S3_ACCESS_KEY: ${RESTIC_S3_ACCESS_KEY:-ueb}
      RESTIC_S3_SECRET_KEY: ${RESTIC_S3_SECRET_KEY}
      RESTIC_CACHE_DIR:     /restic-cache
      JWT_SECRET:       ${JWT_SECRET}
      JWT_EXPIRES_IN:   8h
      SMTP_HOST:  ${SMTP_HOST}
      SMTP_PORT:  ${SMTP_PORT:-587}
      SMTP_USER:  ${SMTP_USER}
      SMTP_PASS:  ${SMTP_PASS}
      SMTP_FROM:  ${SMTP_FROM:-noreply@ueb.local}
      VAPID_PUBLIC_KEY:  ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT:     ${VAPID_SUBJECT:-mailto:admin@ueb.local}
      ALERT_DAYS_BEFORE: ${ALERT_DAYS_BEFORE:-3}
      ALERT_CRON:        ${ALERT_CRON:-0 7 * * *}
      CRM_API_URL:        ${CRM_API_URL}
      CRM_API_KEY:        ${CRM_API_KEY}
      CRM_WEBHOOK_SECRET: ${CRM_WEBHOOK_SECRET}
      GLPI_URL:        ${GLPI_URL}
      GLPI_APP_TOKEN:  ${GLPI_APP_TOKEN}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN}
    volumes:
      - ./backend/logs:/app/logs
      - restic_cache:/restic-cache
    networks:
      - ueb-net

  ui:
    profiles:
      - manual
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: ueb-ui
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - ueb-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`${APP_DOMAIN:-app.ueb.local}`)"
      - "traefik.http.routers.ui.entrypoints=websecure"      
      - "traefik.http.services.ui.loadbalancer.server.port=3001"


  
volumes:
  postgres_data:  #/docker/postgres/postgres_data
  bareos_data:    #/docker/bareos/data
  bareos_storage: #/docker/bareos/storage
  bareos_plugin:  #/docker/bareos/plugins
  minio_data:     #/docker/minio/data
  restic_cache:   #/docker/restic/cache
  traefik_certs:  #/disk/traefik/certs

networks:
  ueb-net:
    driver: bridge